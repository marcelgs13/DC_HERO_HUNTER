<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Anti-Heróis - DC</title>
    <link rel="stylesheet" href="../Estilo/style.css">
    <link rel="shortcut icon" href="../Imagens/dc_logo.png" type="image/x-icon">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-area">
                <img src="../Imagens/dc_logo.png" alt="Logo DC Comics" class="site-logo" lang="en">
                <h1 style="margin:0;" lang="en">DC HERO HUNTER</h1>
            </div>
            <nav style="margin-top:10px; display:flex; gap:15px; flex-wrap:wrap;">
                <a href="../index.html"        style="color:white; text-decoration:none;">Início</a>
                <a href="herois.html"          style="color:white; text-decoration:none;">Heróis</a>
                <a href="viloes.html"          style="color:white; text-decoration:none;">Vilões</a>
                <a href="anti_herois.html"     style="color:#005bc4; font-weight:bold; text-decoration:none;">Anti-Heróis</a>
                <a href="rank.html"            style="color:white; text-decoration:none;">Rank</a>
                <a href="sobre.html"           style="color:white; text-decoration:none;">Sobre o Projeto</a>
            </nav>
            <div class="search-box" style="margin-top:15px;">
                <input type="text" id="searchInput" placeholder="Pesquise por anti-heróis..." list="sugestoes">
                <datalist id="sugestoes"></datalist>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <main class="main-content">
            <h2 style="color:#9c27b0; border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:20px;">
                Galeria de Anti-Heróis e Neutros
            </h2>
            <div id="loading" class="status-message">Convocando mercenários e vigilantes...</div>
            <div id="resultadosGrid" class="grid-container hidden"></div>
        </main>

        <aside class="sidebar">
            <iframe
                id="menuIframe"
                src="menu.html"
                title="Meus Favoritos"
                frameborder="0"
                scrolling="no"
                style="width:100%; height:100%; min-height:500px; border:none; display:block; background:transparent;"
            ></iframe>
        </aside>
    </div>

    <script src="../Js/script.js"></script>
</body>
</html>
